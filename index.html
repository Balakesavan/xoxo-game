<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XOXO — Multiplayer Tic Tac Toe</title>
  <meta name="description" content="Real-time multiplayer Tic Tac Toe. Create or join a room and play from any device." />
  <meta name="theme-color" content="#08080f" />
  <meta property="og:title" content="XOXO — Multiplayer Tic Tac Toe" />
  <meta property="og:description" content="Play real-time multiplayer Tic Tac Toe with anyone in the world." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Animated background orbs -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-x"></div>
  <div class="orb orb-o"></div>
  <div class="orb orb-mid"></div>
</div>

<!-- Confetti Canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Connection Status -->
<div id="connection-status">
  <span class="conn-dot offline" id="conn-dot"></span>
  <span id="conn-label">Offline</span>
</div>

<div id="app">

  <!-- ================================================================ -->
  <!--  LOBBY SCREEN                                                     -->
  <!-- ================================================================ -->
  <section id="lobby-screen" class="screen active">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <span class="logo-x">X</span>
        <span class="logo-sep">×</span>
        <span class="logo-o">O</span>
      </div>
      <div class="logo-tagline">Real-time Multiplayer</div>
    </div>

    <!-- Name + Create -->
    <div class="card lobby-main-card">
      <label class="field-label" for="player-name-input">Your Name</label>
      <input
        type="text"
        id="player-name-input"
        class="name-input"
        placeholder="Enter your name…"
        maxlength="18"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn btn-primary" id="create-btn" onclick="createRoom()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Room
      </button>
    </div>

    <!-- Available Rooms -->
    <div class="card rooms-card">
      <div class="rooms-card-header">
        <span class="section-label">Available Rooms</span>
        <span id="rooms-count" class="rooms-count-badge">Loading…</span>
      </div>

      <div id="rooms-list">
        <div class="rooms-empty">
          <div class="rooms-empty-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          No open rooms — create one!
        </div>
      </div>

      <!-- Collapsible join-by-code -->
      <button class="code-toggle-btn" id="code-toggle-btn" onclick="toggleCodePanel()">
        Have a room code? →
      </button>
      <div id="code-panel" class="code-panel">
        <div class="code-panel-inner">
          <input
            type="text"
            id="room-id-input"
            placeholder="A B C 1 2 3"
            maxlength="6"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn btn-secondary btn-sm" id="join-btn" onclick="joinRoom()">Join</button>
        </div>
      </div>
    </div>

    <p id="status-msg" class="status-msg"></p>

    <!-- Lobby Chat -->
    <div class="card chat-card">
      <div class="chat-header">
        <span class="section-label">Lobby Chat</span>
        <span id="online-count" class="online-pill">
          <span class="live-dot"></span>
          <span id="online-num">0</span> online
        </span>
      </div>
      <div id="online-list"></div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Say something…" maxlength="120" autocomplete="off" spellcheck="false" />
        <button class="btn btn-secondary btn-sm" onclick="sendChat()">Send</button>
      </div>
    </div>

  </section>


  <!-- ================================================================ -->
  <!--  WAITING SCREEN                                                   -->
  <!-- ================================================================ -->
  <section id="waiting-screen" class="screen">

    <div class="logo" style="margin-bottom:28px">
      <div class="logo-mark logo-mark-sm">
        <span class="logo-x">X</span>
        <span class="logo-sep">×</span>
        <span class="logo-o">O</span>
      </div>
    </div>

    <div class="card waiting-card">
      <div class="waiting-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="waiting-title">Room Created!</div>
      <p class="waiting-sub">Share this code with your opponent</p>

      <div class="room-code-block">
        <div class="room-code-label">Room Code</div>
        <div id="room-code-display">——</div>
      </div>

      <button class="btn btn-secondary" id="copy-btn" onclick="copyRoomCode()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>

      <div class="waiting-status">
        <span class="pulse-dot"></span>
        Waiting for opponent…
      </div>
    </div>

    <button class="btn btn-ghost" onclick="leaveRoom()" style="margin-top:16px;max-width:480px;">
      ← Cancel &amp; Leave
    </button>

  </section>


  <!-- ================================================================ -->
  <!--  GAME SCREEN                                                      -->
  <!-- ================================================================ -->
  <section id="game-screen" class="screen">

    <!-- Header -->
    <div class="game-header">
      <div class="room-badge" id="room-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span id="room-badge-code">——</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="leaveRoom()">Leave</button>
    </div>

    <!-- Players + Score -->
    <div class="players-row">

      <div class="player-panel" id="p1-panel">
        <div class="you-badge"></div>
        <div class="player-symbol x-symbol">X</div>
        <div class="player-label">
          <span class="player-online off" id="p1-online"></span>
          <span>Player 1</span>
        </div>
        <div class="player-name-display" id="p1-name">—</div>
        <div class="player-score-val" id="p1-score">0</div>
      </div>

      <div class="score-sep">
        <div class="draws-label">Draw</div>
        <div class="draws-val" id="draws-score">0</div>
        <div class="score-vs">VS</div>
      </div>

      <div class="player-panel" id="p2-panel">
        <div class="you-badge"></div>
        <div class="player-symbol o-symbol">O</div>
        <div class="player-label">
          <span class="player-online off" id="p2-online"></span>
          <span>Player 2</span>
        </div>
        <div class="player-name-display" id="p2-name">—</div>
        <div class="player-score-val" id="p2-score">0</div>
      </div>

    </div>

    <!-- Board -->
    <div class="board-wrapper">
      <div id="board"></div>

      <!-- Result Overlay -->
      <div id="result-overlay">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-title" id="result-title">—</div>
        <div id="result-sub"></div>
        <div id="restart-status" class="restart-status-text"></div>
        <button class="btn btn-primary btn-sm" id="restart-btn" onclick="requestRestart()" style="width:160px;margin-top:4px;">
          Play Again
        </button>
      </div>
    </div>

    <!-- Status + Timer row -->
    <div class="status-row">
      <p id="status-msg" class="status-msg"></p>
      <div id="turn-timer" class="turn-timer" style="display:none;"></div>
    </div>

    <!-- Voice Bar -->
    <div class="voice-bar" id="voice-bar">
      <div class="voice-info">
        <span class="voice-dot" id="voice-dot"></span>
        <span id="voice-status-text">Voice Chat</span>
      </div>
      <div class="voice-actions">
        <button class="btn btn-ghost btn-sm" id="mute-btn" onclick="toggleMute()" style="display:none;">Mute</button>
        <button class="btn btn-ghost btn-sm" id="voice-btn" onclick="toggleVoiceChat()">Join Voice</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="game-controls">
      <button class="btn btn-ghost btn-sm" onclick="requestRestart()">↺ Restart</button>
      <button class="btn btn-ghost btn-sm" onclick="leaveRoom()">← Leave Room</button>
    </div>

  </section>

  <audio id="remote-audio" autoplay playsinline></audio>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase-config.js"></script>
<script src="game.js"></script>

</body>
</html>
